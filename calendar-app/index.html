<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeakTracker · Calendar</title>
<script src="/i18n.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --rock:    #0f1510;
  --granite: #1a2018;
  --cliff:   #232d20;
  --slate:   #2e3c2a;
  --fog:     #5a8055;
  --muted:   #8ab080;
  --snow:    #e8f5e0;
  --sun:     #f5a623;
  --sky:     #4a9fd4;
  --moss:    #4aaa5a;
  --done:    #27ae60;
  --danger:  #c0392b;
  --radius:  10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--rock); color: var(--snow); min-height: 100vh; }

/* ── Header ── */
header {
  height: 52px; background: #0a100a; border-bottom: 1px solid #2a3a2a;
  display: flex; align-items: center; padding: 0 1.2rem; gap: 1rem; position: sticky; top: 0; z-index: 100;
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.08em; color: var(--snow); text-decoration: none; flex-shrink: 0; }
.logo span { color: #7ec87e; }
nav { display: flex; gap: 0.25rem; }
.nav-link { padding: 0.35rem 0.8rem; border-radius: 6px; font-size: 0.8rem; color: var(--muted); text-decoration: none; transition: all 0.15s; border: 1px solid transparent; }
.nav-link:hover { color: var(--snow); background: #ffffff10; }
.nav-link.active { color: #7ec87e; background: #7ec87e18; border-color: #7ec87e30; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
.user-badge { font-size: 0.72rem; color: var(--muted); }
.btn-logout { font-size: 0.72rem; color: var(--muted); background: transparent; border: 1px solid #ffffff18; border-radius: 20px; padding: 0.25rem 0.7rem; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
.btn-logout:hover { color: var(--danger); border-color: var(--danger); }

/* ── Page ── */
.page { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

.toolbar {
  display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap;
}
.toolbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.06em; flex: 1; }
.filter-pills { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.pill {
  padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.72rem; font-weight: 600;
  border: 1px solid #ffffff20; background: transparent; color: var(--muted);
  cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.04em;
}
.pill:hover { background: #ffffff10; color: var(--snow); }
.pill.active { background: #7ec87e20; color: #7ec87e; border-color: #7ec87e50; }
.pill-open      { }
.pill-full      { }
.pill-completed { }
.pill-cancelled { }
.pill.active.pill-open      { background: #4a9fd420; color: var(--sky); border-color: #4a9fd450; }
.pill.active.pill-completed { background: #27ae6020; color: #7ec87e; border-color: #27ae6050; }
.pill.active.pill-cancelled { background: #c0392b20; color: #e87e7e; border-color: #c0392b50; }

.btn-new-event {
  background: #7ec87e; color: #141a14; border: none; border-radius: 8px;
  padding: 0.55rem 1.1rem; font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
  font-weight: 700; cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
}
.btn-new-event:hover { opacity: 0.85; }

/* ── Events grid ── */
.events-grid { display: flex; flex-direction: column; gap: 0.75rem; }

.event-card {
  background: var(--granite); border: 1px solid #2a3a2a; border-radius: 12px;
  padding: 1rem 1.2rem; cursor: pointer; transition: border-color 0.15s, background 0.12s;
  display: flex; gap: 1rem; align-items: flex-start;
}
.event-card:hover { border-color: #4a7a4a; background: #1e281e; }
.event-card.status-completed { border-left: 3px solid var(--done); }
.event-card.status-open      { border-left: 3px solid var(--sky); }
.event-card.status-full      { border-left: 3px solid var(--sun); }
.event-card.status-cancelled { border-left: 3px solid var(--danger); opacity: 0.65; }

.event-date-block {
  min-width: 52px; text-align: center; flex-shrink: 0; padding-top: 0.1rem;
}
.event-day   { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; line-height: 1; color: var(--snow); }
.event-month { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }

.event-body { flex: 1; min-width: 0; }
.event-header { display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.35rem; flex-wrap: wrap; }
.event-name { font-size: 1rem; font-weight: 700; }
.event-status-badge {
  font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  padding: 0.15rem 0.45rem; border-radius: 4px; flex-shrink: 0; margin-top: 0.15rem;
}
.badge-open      { background: #4a9fd420; color: var(--sky); border: 1px solid #4a9fd440; }
.badge-full      { background: #f5a62320; color: var(--sun); border: 1px solid #f5a62340; }
.badge-completed { background: #27ae6020; color: #7ec87e; border: 1px solid #27ae6040; }
.badge-cancelled { background: #c0392b20; color: #e87e7e; border: 1px solid #c0392b40; }

.event-meta {
  display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
  font-size: 0.73rem; color: var(--muted); margin-bottom: 0.35rem;
}
.meta-chip { display: flex; align-items: center; gap: 0.25rem; }
.event-notes { font-size: 0.78rem; color: #6a9a6a; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

.event-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; flex-shrink: 0; }
.participants-badge {
  background: #2e3c2a; border: 1px solid #3a5a3a; border-radius: 20px;
  padding: 0.2rem 0.6rem; font-size: 0.7rem; color: var(--muted);
  white-space: nowrap;
}
.participants-badge strong { color: #7ec87e; }
.rsvp-pill {
  font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
  padding: 0.15rem 0.5rem; border-radius: 4px;
}
.rsvp-going     { background: #27ae6025; color: #7ec87e; border: 1px solid #27ae6045; }
.rsvp-maybe     { background: #f5a62325; color: var(--sun); border: 1px solid #f5a62345; }
.rsvp-not_going { background: #c0392b25; color: #e87e7e; border: 1px solid #c0392b45; }

.empty-state {
  text-align: center; padding: 4rem 1rem; color: var(--muted);
}
.empty-state p { font-size: 0.88rem; font-style: italic; }

/* ── Activity type icons ── */
.act-icon { font-size: 0.95rem; }

/* ── Overlay & Modal ── */
.overlay {
  position: fixed; inset: 0; background: #00000088; backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay.visible { opacity: 1; pointer-events: all; }
.modal {
  background: var(--granite); border: 1px solid #4a7a4a; border-radius: 14px;
  padding: 1.8rem; width: 100%; max-width: 520px;
  transform: translateY(16px); transition: transform 0.2s;
  max-height: 90vh; overflow-y: auto;
}
.overlay.visible .modal { transform: translateY(0); }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
.modal-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.3rem; }

.field { margin-bottom: 0.85rem; }
.field label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.3rem; font-weight: 600; }
.field input, .field textarea, .field select {
  width: 100%; background: var(--rock); border: 1px solid #2a3a2a; border-radius: 6px;
  padding: 0.55rem 0.75rem; color: var(--snow); font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem; outline: none; transition: border-color 0.15s; resize: vertical;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: #7ec87e; }
.field input::placeholder, .field textarea::placeholder { color: #3a5a3a; }
.field select option { background: var(--cliff); }

.form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.form-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }

.section-divider { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fog); margin: 1rem 0 0.5rem; font-weight: 600; }

.modal-actions { display: flex; gap: 0.6rem; margin-top: 1.3rem; }
.btn { padding: 0.6rem 1.1rem; border-radius: 6px; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: #7ec87e; color: #141a14; flex: 1; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: #ffffff10; color: var(--muted); border: 1px solid #2a3a2a; }
.btn-secondary:hover { background: #ffffff18; }
.btn-danger { background: #3a1a1a; color: #f09090; border: 1px solid #e0505030; }
.btn-danger:hover { background: #4a1a1a; }

/* ── Detail modal specific ── */
.detail-header { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 1rem; }
.detail-act-icon { font-size: 2rem; flex-shrink: 0; padding-top: 0.1rem; }
.detail-title-block .detail-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.06em; line-height: 1.1; }
.detail-title-block .detail-dates { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

/* ── Hero photo (completed events with photo) ── */
.detail-hero {
  margin: -1.8rem -1.8rem 1.4rem;
  height: 220px;
  position: relative;
  overflow: hidden;
  border-radius: 14px 14px 0 0;
  display: none;
}
.detail-hero.visible { display: block; }
.detail-hero-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: brightness(0.7);
}
.detail-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    transparent 35%,
    rgba(10,16,10,0.55) 65%,
    #1a2018 100%
  );
}
.detail-hero-content {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 1rem 1.4rem 0.9rem;
}
.detail-hero-content .detail-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem; letter-spacing: 0.06em; line-height: 1.1;
  color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,0.6);
}
.detail-hero-content .detail-dates {
  font-size: 0.78rem; color: rgba(255,255,255,0.75); margin-top: 0.2rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.detail-hero-badge {
  font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  padding: 0.15rem 0.45rem; border-radius: 4px;
  background: #27ae6040; color: #a0f0b0; border: 1px solid #27ae6060;
  backdrop-filter: blur(4px);
}

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem 1.5rem; margin-bottom: 1rem; }
.detail-item label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fog); font-weight: 600; }
.detail-item p { font-size: 0.85rem; color: var(--snow); margin-top: 0.1rem; }

.status-bar { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
.status-btn {
  padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em; border: 1px solid #ffffff20;
  background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.status-btn:hover { background: #ffffff10; color: var(--snow); }
.status-btn.cur-open      { background: #4a9fd420; color: var(--sky); border-color: #4a9fd450; }
.status-btn.cur-full      { background: #f5a62320; color: var(--sun); border-color: #f5a62350; }
.status-btn.cur-completed { background: #27ae6020; color: #7ec87e; border-color: #27ae6050; }
.status-btn.cur-cancelled { background: #c0392b20; color: #e87e7e; border-color: #c0392b50; }

.rsvp-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
.rsvp-btn {
  flex: 1; padding: 0.5rem; border-radius: 8px; border: 1px solid #2a3a2a;
  background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.15s; text-align: center;
}
.rsvp-btn:hover { background: #ffffff10; color: var(--snow); }
.rsvp-btn.active-going     { background: #27ae6025; color: #7ec87e; border-color: #27ae6055; }
.rsvp-btn.active-maybe     { background: #f5a62325; color: var(--sun); border-color: #f5a62355; }
.rsvp-btn.active-not_going { background: #c0392b25; color: #e87e7e; border-color: #c0392b55; }

.attendees-list { display: flex; flex-direction: column; gap: 0.35rem; max-height: 200px; overflow-y: auto; }
.attendee-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--rock); border-radius: 6px; padding: 0.4rem 0.6rem;
  font-size: 0.78rem;
}
.attendee-name { color: var(--snow); }
.attendee-status { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }

/* ── Cost badge ── */
.cost-tag {
  background: #f5a62315; border: 1px solid #f5a62330; border-radius: 5px;
  padding: 0.15rem 0.5rem; font-size: 0.72rem; color: var(--sun); font-weight: 600;
}

/* ── View toggle ── */
.view-toggle { display: flex; border: 1px solid #2a3a2a; border-radius: 8px; overflow: hidden; }
.view-btn {
  padding: 0.35rem 0.75rem; font-size: 0.78rem; font-weight: 600;
  background: transparent; color: var(--muted); border: none; cursor: pointer;
  transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.view-btn:hover { background: #ffffff10; color: var(--snow); }
.view-btn.active { background: #2e3c2a; color: var(--snow); }

/* ── Month calendar ── */
.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.cal-nav-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.06em; }
.cal-nav-btn {
  background: transparent; border: 1px solid #2a3a2a; color: var(--muted);
  border-radius: 6px; padding: 0.35rem 0.7rem; cursor: pointer;
  font-size: 1rem; transition: all 0.15s; line-height: 1;
}
.cal-nav-btn:hover { background: #ffffff10; color: var(--snow); }
.cal-today-btn {
  background: transparent; border: 1px solid #2a3a2a; color: var(--muted);
  border-radius: 6px; padding: 0.3rem 0.65rem; cursor: pointer;
  font-size: 0.72rem; font-weight: 600; font-family: 'DM Sans', sans-serif;
  text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.15s;
}
.cal-today-btn:hover { background: #ffffff10; color: var(--snow); }

.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  border: 1px solid #2a3a2a; border-radius: 10px; overflow: hidden;
}
.cal-dow {
  background: #0f1a0f; border-bottom: 1px solid #2a3a2a;
  padding: 0.5rem 0; text-align: center;
  font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600;
}
.cal-cell {
  min-height: 100px; background: var(--granite);
  border-right: 1px solid #1e2a1e; border-bottom: 1px solid #1e2a1e;
  padding: 0.4rem; vertical-align: top; position: relative;
}
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell.other-month { background: #131a12; }
.cal-cell.today { background: #1e3018; }
.cal-cell.today .cal-day-num { color: #7ec87e; font-weight: 700; }
.cal-day-num {
  font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem;
  line-height: 1; display: block;
}
.cal-chip {
  display: block; padding: 0.15rem 0.4rem; border-radius: 4px; margin-bottom: 0.2rem;
  font-size: 0.67rem; font-weight: 600; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; cursor: pointer; transition: opacity 0.12s; line-height: 1.4;
}
.cal-chip:hover { opacity: 0.8; }
.cal-chip-open      { background: #4a9fd430; color: #9dd4f0; border-left: 2px solid var(--sky); }
.cal-chip-full      { background: #f5a62330; color: #ffd080; border-left: 2px solid var(--sun); }
.cal-chip-completed { background: #27ae6030; color: #9eeaaa; border-left: 2px solid var(--done); }
.cal-chip-cancelled { background: #c0392b25; color: #f09090; border-left: 2px solid var(--danger); opacity: 0.7; }
.cal-more {
  font-size: 0.62rem; color: var(--fog); cursor: pointer; padding: 0.1rem 0.3rem;
  display: block; margin-top: 0.1rem;
}
.cal-more:hover { color: var(--muted); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--cliff); border: 1px solid #7ec87e; border-radius: 6px;
  padding: 0.65rem 1.2rem; font-size: 0.82rem; z-index: 3000;
  opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap;
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .form-2col, .form-3col { grid-template-columns: 1fr; }
  .detail-grid { grid-template-columns: 1fr; }
  .event-right { display: none; }
  .cal-cell { min-height: 64px; padding: 0.25rem; }
  .cal-chip { font-size: 0.6rem; padding: 0.1rem 0.3rem; }
  .cal-dow  { font-size: 0.55rem; padding: 0.3rem 0; }
  .filter-pills { display: none; }
}
</style>
</head>
<body>

<header>
  <a class="logo" href="/">Peak<span>Tracker</span></a>
  <nav>
    <a class="nav-link" href="/map.html" data-i18n="nav_map">Map</a>
    <a class="nav-link active" href="/calendar/" data-i18n="nav_calendar">Calendar</a>
    <a class="nav-link admin-only" href="/admin.html" id="admin-link" data-i18n="nav_admin" style="display:none">Admin</a>
  </nav>
  <div class="header-right">
    <span class="user-badge" id="user-badge" onclick="openProfileModal()" style="cursor:pointer;" title="Edit profile"></span>
    <button class="btn-logout" onclick="logout()" data-i18n="sign_out">Sign out</button>
  </div>
</header>

<div class="page">
  <div class="toolbar">
    <div class="toolbar-title" data-i18n="group_calendar">Group Calendar</div>
    <div class="filter-pills" id="filter-pills">
      <button class="pill active" data-filter="all" onclick="setFilter('all')" data-i18n="filter_all">All</button>
      <button class="pill pill-open" data-filter="open" onclick="setFilter('open')" data-i18n="filter_open">Open</button>
      <button class="pill pill-completed" data-filter="completed" onclick="setFilter('completed')" data-i18n="filter_completed">Completed</button>
      <button class="pill pill-cancelled" data-filter="cancelled" onclick="setFilter('cancelled')" data-i18n="filter_cancelled">Cancelled</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="view-list-btn" onclick="setView('list')" data-i18n="view_list">☰ List</button>
      <button class="view-btn" id="view-cal-btn" onclick="setView('calendar')" data-i18n="view_month">⊞ Month</button>
    </div>
    <button class="btn-new-event" onclick="openCreateModal()" data-i18n="btn_new_event">+ New event</button>
  </div>

  <!-- List view -->
  <div id="view-list">
    <div class="events-grid" id="events-grid">
      <div class="empty-state"><p>Loading…</p></div>
    </div>
  </div>

  <!-- Month calendar view -->
  <div id="view-calendar" style="display:none">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calPrev()">‹</button>
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <span class="cal-nav-title" id="cal-title"></span>
        <button class="cal-today-btn" onclick="calToday()">Today</button>
      </div>
      <button class="cal-nav-btn" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<!-- ── Detail / View modal ── -->
<div class="overlay" id="overlay-detail" onclick="closeDetailIfBackdrop(event)">
  <div class="modal" style="max-width:560px">

    <!-- Hero photo (completed events with photo) -->
    <div class="detail-hero" id="d-hero">
      <img class="detail-hero-img" id="d-hero-img" src="" alt="">
      <div class="detail-hero-overlay"></div>
      <div class="detail-hero-content">
        <div class="detail-name" id="d-name-hero"></div>

<script>
// ── Auth / session ────────────────────────────────────────────────────────────
function decodeJwtPayload(tok) {
  try { return JSON.parse(atob(tok.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  catch { return null; }
}

const _token  = sessionStorage.getItem('pt_token');
const _claims = _token ? decodeJwtPayload(_token) : null;
const isAdmin = _claims?.role === 'admin';
const myId    = _claims?.sub ?? '';
const myName  = _claims?.username ?? '';

if (_claims) {
  document.getElementById('user-badge').textContent = _claims.username;
  if (isAdmin) document.getElementById('admin-link').style.display = '';
}
document.addEventListener('DOMContentLoaded', applyI18n);

async function logout() {
  sessionStorage.removeItem('pt_token');
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login.html';
}

// ── Data ──────────────────────────────────────────────────────────────────────
let events = [];
let peaks  = []; // loaded alongside events to look up photos
let activeFilter = 'all';
let viewMode     = 'list';
let calYear, calMonth;
const _today = new Date();
calYear  = _today.getFullYear();
calMonth = _today.getMonth(); // 0-based
let detailEventId = null;
let editEventId   = null;

async function loadEvents() {
  try {
    const [rCal, rPeaks] = await Promise.all([
      fetch('/api/calendar'),
      fetch('/api/peaks'),
    ]);
    if (!rCal.ok) throw new Error();
    events = await rCal.json();
    peaks  = rPeaks.ok ? await rPeaks.json() : [];
    renderGrid();
    if (viewMode === 'calendar') renderCalendar();
  } catch {
    document.getElementById('events-grid').innerHTML =
      '<div class="empty-state"><p>Error loading events</p></div>';
  }
}

function peakPhotoFor(peakName) {
  const match = peaks.find(p => p.name.toLowerCase() === peakName.toLowerCase());
  return match?.photo_url ?? null;
}

// ── Filter ────────────────────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', p.dataset.filter === f);
  });
  renderGrid();
  if (viewMode === 'calendar') renderCalendar();
}

function filtered() {
  if (activeFilter === 'all') return events;
  return events.filter(e => e.status === activeFilter);
}

// ── Render grid ───────────────────────────────────────────────────────────────
const ACT_ICONS = {
  hike: '🥾', via_ferrata: '🪝', ski: '⛷️', trail_run: '🏃',
  cycling: '🚵', camping: '🏕️', other: '🗺️'
};
const ACT_KEYS = {
  hike: 'act_hike', via_ferrata: 'act_via_ferrata', ski: 'act_ski',
  trail_run: 'act_trail_run', cycling: 'act_cycling', camping: 'act_camping', other: 'act_other'
};

function actIcon(t) { return ACT_ICONS[t] || '🗺️'; }

function renderGrid() {
  const list = filtered();
  const grid = document.getElementById('events-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><p>No events to show. Create one!</p></div>';
    return;
  }

  grid.innerHTML = list.map(ev => {
    const [y, m, d] = ev.planned_date.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const month  = months[parseInt(m,10)-1] ?? m;
    const myRsvp = getMyRsvp(ev);

    const metaParts = [
      ev.difficulty ? `<span class="meta-chip">📊 ${esc(ev.difficulty)}</span>` : '',
      ev.duration_hours ? `<span class="meta-chip">⏱ ${ev.duration_hours}h</span>` : '',
      ev.meeting_point ? `<span class="meta-chip">📍 ${esc(ev.meeting_point)}</span>` : '',
      ev.cost_per_person ? `<span class="meta-chip cost-tag">${formatCost(ev.cost_per_person, ev.currency)}/person</span>` : '',
    ].filter(Boolean).join('');

    const endDateStr = ev.end_date && ev.end_date !== ev.planned_date
      ? ` → ${formatDate(ev.end_date)}` : '';

    return `
    <div class="event-card status-${ev.status}" onclick="openDetail('${ev.id}')">
      <div class="event-date-block">
        <div class="event-day">${d}</div>
        <div class="event-month">${month} ${y}</div>
      </div>
      <div class="event-body">
        <div class="event-header">
          <span class="act-icon">${actIcon(ev.activity_type)}</span>
          <span class="event-name">${esc(ev.peak_name)}</span>
          <span class="event-status-badge badge-${ev.status}">${statusLabel(ev.status)}</span>
        </div>
        <div class="event-meta">
          <span class="meta-chip" style="color:#8ab080">${t('by_label')} ${esc(ev.created_by_name)}</span>
          ${endDateStr ? `<span class="meta-chip">${endDateStr}</span>` : ''}
          ${metaParts}
        </div>
        ${ev.notes ? `<div class="event-notes">${esc(ev.notes)}</div>` : ''}
      </div>
      <div class="event-right">
        <div class="participants-badge">${t('participants_going', `<strong>${ev.participant_count}</strong>`)}</div>
        ${myRsvp ? `<div class="rsvp-pill rsvp-${myRsvp}">${rsvpLabel(myRsvp)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function getMyRsvp(ev) {
  if (!ev.attendees) return null;
  const me = ev.attendees.find(a => a.user_id === myId);
  return me?.status ?? null;
}

function statusLabel(s) {
  const k = { open: 'status_open', full: 'status_full', completed: 'status_completed', cancelled: 'status_cancelled' }[s];
  return k ? t(k) : s;
}

function rsvpLabel(s) {
  const k = { going: 'rsvp_going', maybe: 'rsvp_maybe', not_going: 'rsvp_not_going' }[s];
  return k ? t(k) : s;
}

function formatCost(c, currency) {
  const symbols = { EUR: '€', USD: '$', GBP: '£', CHF: 'CHF ' };
  const sym = symbols[currency] || currency + ' ';
  return sym + parseFloat(c).toFixed(2);
}

// ── View switch ───────────────────────────────────────────────────────────────
function setView(v) {
  viewMode = v;
  document.getElementById('view-list-btn').classList.toggle('active', v === 'list');
  document.getElementById('view-cal-btn').classList.toggle('active', v === 'calendar');
  document.getElementById('view-list').style.display     = v === 'list'     ? '' : 'none';
  document.getElementById('view-calendar').style.display = v === 'calendar' ? '' : 'none';
  // Filter pills only meaningful in list view — keep visible both ways
  if (v === 'calendar') renderCalendar();
}

// ── Month calendar ────────────────────────────────────────────────────────────
const MONTHS = t('months').split(',');
const DOW    = t('days_short').split(',');

function calPrev()  { calMonth--; if (calMonth < 0)  { calMonth = 11; calYear--; } renderCalendar(); }
function calNext()  { calMonth++; if (calMonth > 11) { calMonth = 0;  calYear++; } renderCalendar(); }
function calToday() { calYear = _today.getFullYear(); calMonth = _today.getMonth(); renderCalendar(); }

function renderCalendar() {
  document.getElementById('cal-title').textContent = MONTHS[calMonth] + ' ' + calYear;

  // First day of month and how many days
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay  = new Date(calYear, calMonth + 1, 0);
  const totalDays = lastDay.getDate();

  // Monday-first offset (0=Mon … 6=Sun)
  let startOffset = firstDay.getDay() - 1;
  if (startOffset < 0) startOffset = 6;

  // Days from previous month to pad
  const prevLastDay = new Date(calYear, calMonth, 0).getDate();

  // Events indexed by date string "YYYY-MM-DD" — include multi-day spans
  const byDate = new Map();
  const addToDate = (dateStr, ev) => {
    if (!byDate.has(dateStr)) byDate.set(dateStr, []);
    byDate.get(dateStr).push(ev);
  };

  const list = filtered();
  list.forEach(ev => {
    const start = ev.planned_date;
    const end   = ev.end_date && ev.end_date >= start ? ev.end_date : start;
    // Iterate each day in the span (cap at 60 days to avoid runaway)
    let cur = new Date(start + 'T00:00:00');
    const endDate = new Date(end + 'T00:00:00');
    let count = 0;
    while (cur <= endDate && count < 60) {
      addToDate(cur.toISOString().split('T')[0], ev);
      cur.setDate(cur.getDate() + 1);
      count++;
    }
  });

  const todayStr = _today.toISOString().split('T')[0];

  // Build grid cells
  const totalCells = Math.ceil((startOffset + totalDays) / 7) * 7;
  let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');

  for (let i = 0; i < totalCells; i++) {
    let dayNum, dateStr, otherMonth = false;
    if (i < startOffset) {
      dayNum = prevLastDay - startOffset + 1 + i;
      const pm = calMonth === 0 ? 11 : calMonth - 1;
      const py = calMonth === 0 ? calYear - 1 : calYear;
      dateStr = `${py}-${String(pm+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      otherMonth = true;
    } else if (i >= startOffset + totalDays) {
      dayNum = i - startOffset - totalDays + 1;
      const nm = calMonth === 11 ? 0 : calMonth + 1;
      const ny = calMonth === 11 ? calYear + 1 : calYear;
      dateStr = `${ny}-${String(nm+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      otherMonth = true;
    } else {
      dayNum = i - startOffset + 1;
      dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    }

    const isToday = dateStr === todayStr;
    const cellEvs = byDate.get(dateStr) || [];
    // Deduplicate by id (multi-day events appear once per cell)
    const seen = new Set();
    const uniq = cellEvs.filter(e => seen.has(e.id) ? false : (seen.add(e.id), true));

    const MAX_CHIPS = 3;
    const chips = uniq.slice(0, MAX_CHIPS).map(ev =>
      `<span class="cal-chip cal-chip-${ev.status}" onclick="event.stopPropagation();openDetail('${ev.id}')" title="${esc(ev.peak_name)}">
        ${actIcon(ev.activity_type)} ${esc(ev.peak_name)}
      </span>`
    ).join('');
    const more = uniq.length > MAX_CHIPS
      ? `<span class="cal-more" onclick="event.stopPropagation();showDayPopover('${dateStr}')">+${uniq.length - MAX_CHIPS} more</span>`
      : '';

    html += `<div class="cal-cell${otherMonth ? ' other-month' : ''}${isToday ? ' today' : ''}">
      <span class="cal-day-num">${dayNum}</span>
      ${chips}${more}
    </div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
}

function showDayPopover(dateStr) {
  // Show all events for a day — reuse the list filter approach by just rendering the day
  // Simple approach: open a temporary "day" view (scroll to list, filter by date)
  // For now, switch to list view filtered to show upcoming
  setView('list');
  showToast('Showing all events in list view');
}

// ── Detail modal ──────────────────────────────────────────────────────────────
async function openDetail(id) {
  // Fetch fresh event with attendees
  try {
    const r = await fetch(`/api/calendar/${id}`);
    if (!r.ok) throw new Error();
    const ev = await r.json();
    // Update local cache
    const idx = events.findIndex(e => e.id === id);
    if (idx !== -1) events[idx] = ev;
    showDetail(ev);
  } catch {
    showToast(t('err_load_event'), true);
  }
}

function showDetail(ev) {
  detailEventId = ev.id;
  const canManage = ev.created_by === myId;

  // Dates string (shared)
  const endStr = ev.end_date && ev.end_date !== ev.planned_date
    ? ` — ${formatDate(ev.end_date)}` : '';
  const datesText = formatDate(ev.planned_date) + endStr + '  ·  ' + ucFirst(ev.activity_type.replace('_', ' '));

  // Hero photo (completed events with a matching peak photo)
  const photo = ev.status === 'completed' ? peakPhotoFor(ev.peak_name) : null;
  const hero  = document.getElementById('d-hero');
  const normalHeader = document.getElementById('d-header');

  if (photo) {
    hero.classList.add('visible');
    normalHeader.style.display = 'none';
    document.getElementById('d-hero-img').src = photo;
    document.getElementById('d-hero-img').alt = ev.peak_name;
    document.getElementById('d-name-hero').textContent  = ev.peak_name;
    document.getElementById('d-dates-hero-text').textContent = datesText;
  } else {
    hero.classList.remove('visible');
    normalHeader.style.display = '';
    document.getElementById('d-act-icon').textContent = actIcon(ev.activity_type);
    document.getElementById('d-name').textContent  = ev.peak_name;
    document.getElementById('d-dates').textContent = datesText;
  }

  // Status bar (only for managers)
  const statusSection = document.getElementById('d-status-section');
  if (canManage) {
    statusSection.style.display = 'block';
    const statuses = ['open','full','completed','cancelled'];
    document.getElementById('d-status-bar').innerHTML = statuses.map(s =>
      `<button class="status-btn ${ev.status === s ? 'cur-' + s : ''}"
               onclick="changeStatus('${s}')">${statusLabel(s)}</button>`
    ).join('');
  } else {
    statusSection.style.display = 'none';
  }

  // Info grid
  const items = [
    ev.difficulty ? { label: t('lbl_difficulty_field'), val: ev.difficulty } : null,
    ev.duration_hours ? { label: t('lbl_duration_field'), val: ev.duration_hours + 'h' } : null,
    ev.max_participants ? { label: t('lbl_max_p_field'), val: ev.max_participants } : null,
    ev.cost_per_person ? { label: t('lbl_cost_field'), val: formatCost(ev.cost_per_person, ev.currency) } : null,
    ev.meeting_point ? { label: t('lbl_meeting_field'), val: ev.meeting_point } : null,
    { label: t('lbl_organised_by'), val: ev.created_by_name },
    { label: t('lbl_status_field'), val: statusLabel(ev.status) },
  ].filter(Boolean);

  document.getElementById('d-info-grid').innerHTML = items.map(i =>
    `<div class="detail-item"><label>${esc(i.label)}</label><p>${esc(String(i.val))}</p></div>`
  ).join('');

  // Notes
  if (ev.notes) {
    document.getElementById('d-notes-wrap').style.display = 'block';
    document.getElementById('d-notes').textContent = ev.notes;
  } else {
    document.getElementById('d-notes-wrap').style.display = 'none';
  }

  // RSVP (only for open/full events — not completed or cancelled)
  const rsvpSection = document.getElementById('d-rsvp-section');
  if (ev.status !== 'cancelled' && ev.status !== 'completed') {
    rsvpSection.style.display = 'block';
    const myRsvp = (ev.attendees || []).find(a => a.user_id === myId)?.status ?? null;
    document.getElementById('d-rsvp-bar').innerHTML = `
      <button class="rsvp-btn ${myRsvp === 'going' ? 'active-going' : ''}" onclick="rsvp('going')">${t('rsvp_going')}</button>
      <button class="rsvp-btn ${myRsvp === 'maybe' ? 'active-maybe' : ''}" onclick="rsvp('maybe')">${t('rsvp_maybe')}</button>
      <button class="rsvp-btn ${myRsvp === 'not_going' ? 'active-not_going' : ''}" onclick="rsvp('not_going')">${t('rsvp_not_going')}</button>
      ${myRsvp ? `<button class="rsvp-btn" style="background:#ffffff08;flex:0;padding:0.5rem 0.6rem;" onclick="cancelRsvp()">✕</button>` : ''}
    `;
  } else {
    rsvpSection.style.display = 'none';
  }

  // Attendees
  const attendees = ev.attendees || [];
  const attSection = document.getElementById('d-attendees-section');
  if (attendees.length) {
    attSection.style.display = 'block';
    document.getElementById('d-attendees-section').querySelector('.section-divider').textContent =
      t('section_participants', ev.participant_count);
    const attColors = { going: '#7ec87e', maybe: '#f5a623', not_going: '#e87e7e' };
    document.getElementById('d-attendees').innerHTML = attendees.map(a => `
      <div class="attendee-row">
        <span class="attendee-name">${esc(a.display_name || a.username)}</span>
        <span class="attendee-status" style="color:${attColors[a.status] || '#8ab080'}">${rsvpLabel(a.status)}</span>
      </div>
    `).join('');
  } else {
    attSection.style.display = 'none';
  }

  // Edit / Delete buttons
  document.getElementById('d-btn-edit').style.display   = canManage ? '' : 'none';
  document.getElementById('d-btn-delete').style.display = canManage ? '' : 'none';

  document.getElementById('overlay-detail').classList.add('visible');
}

function closeDetailModal() {
  document.getElementById('overlay-detail').classList.remove('visible');
  detailEventId = null;
}

function closeDetailIfBackdrop(e) {
  if (e.target === e.currentTarget) closeDetailModal();
}

// ── Status change ─────────────────────────────────────────────────────────────
async function changeStatus(newStatus) {
  if (!detailEventId) return;
  try {
    const r = await fetch(`/api/calendar/${detailEventId}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus }),
    });
    if (!r.ok) throw new Error();
    const updated = await r.json();
    const idx = events.findIndex(e => e.id === detailEventId);
    if (idx !== -1) events[idx] = { ...events[idx], ...updated };
    showDetail(updated);
    renderGrid();
    showToast(t('toast_status_updated'));
  } catch { showToast(t('err_update_status'), true); }
}

// ── RSVP ──────────────────────────────────────────────────────────────────────
async function rsvp(status) {
  if (!detailEventId) return;
  try {
    const r = await fetch(`/api/calendar/${detailEventId}/rsvp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status }),
    });
    if (!r.ok) throw new Error();
    const updated = await r.json();
    const idx = events.findIndex(e => e.id === detailEventId);
    if (idx !== -1) events[idx] = updated;
    showDetail(updated);
    renderGrid();
    if (viewMode === 'calendar') renderCalendar();
    showToast(status === 'going' ? t('rsvp_toast_going') : status === 'maybe' ? t('rsvp_toast_maybe') : t('rsvp_toast_not_going'));
  } catch { showToast(t('err_rsvp'), true); }
}

async function cancelRsvp() {
  if (!detailEventId) return;
  try {
    const r = await fetch(`/api/calendar/${detailEventId}/rsvp`, { method: 'DELETE' });
    if (!r.ok) throw new Error();
    const updated = await r.json();
    const idx = events.findIndex(e => e.id === detailEventId);
    if (idx !== -1) events[idx] = updated;
    showDetail(updated);
    renderGrid();
    showToast(t('rsvp_toast_removed'));
  } catch { showToast(t('err_rsvp'), true); }
}

// ── Delete event ──────────────────────────────────────────────────────────────
async function deleteEvent() {
  if (!detailEventId) return;
  const ev = events.find(e => e.id === detailEventId);
  if (!confirm(t('confirm_del_event', ev?.peak_name ?? ''))) return;
  try {
    const r = await fetch(`/api/calendar/${detailEventId}`, { method: 'DELETE' });
    if (!r.ok) throw new Error();
    events = events.filter(e => e.id !== detailEventId);
    closeDetailModal();
    renderGrid();
    showToast(t('toast_event_deleted'));
  } catch { showToast(t('err_del_event'), true); }
}

// ── Create / Edit form modal ──────────────────────────────────────────────────
function openCreateModal() {
  editEventId = null;
  document.getElementById('form-title').textContent = t('form_new_title');
  document.getElementById('form-sub').textContent   = t('form_new_sub');
  document.getElementById('btn-form-save').textContent = t('form_btn_create');
  document.getElementById('f-status-row').style.display = 'none';
  clearForm();
  document.getElementById('overlay-form').classList.add('visible');
  setTimeout(() => document.getElementById('f-name').focus(), 80);
}

function openEditFromDetail() {
  const ev = events.find(e => e.id === detailEventId);
  if (!ev) return;
  editEventId = ev.id;
  closeDetailModal();
  document.getElementById('form-title').textContent = t('form_edit_title');
  document.getElementById('form-sub').textContent   = ev.peak_name;
  document.getElementById('btn-form-save').textContent = t('form_btn_save');
  document.getElementById('f-status-row').style.display = 'block';
  fillForm(ev);
  document.getElementById('overlay-form').classList.add('visible');
}

function clearForm() {
  document.getElementById('f-name').value      = '';
  document.getElementById('f-activity').value  = 'hike';
  document.getElementById('f-difficulty').value = '';
  document.getElementById('f-date-start').value = '';
  document.getElementById('f-date-end').value   = '';
  document.getElementById('f-duration').value   = '';
  document.getElementById('f-max-p').value      = '';
  document.getElementById('f-meeting').value    = '';
  document.getElementById('f-cost').value       = '';
  document.getElementById('f-currency').value   = 'EUR';
  document.getElementById('f-notes').value      = '';
  document.getElementById('f-status').value     = 'open';
}

function fillForm(ev) {
  document.getElementById('f-name').value      = ev.peak_name;
  document.getElementById('f-activity').value  = ev.activity_type;
  document.getElementById('f-difficulty').value = ev.difficulty || '';
  document.getElementById('f-date-start').value = ev.planned_date;
  document.getElementById('f-date-end').value   = ev.end_date || '';
  document.getElementById('f-duration').value   = ev.duration_hours ?? '';
  document.getElementById('f-max-p').value      = ev.max_participants ?? '';
  document.getElementById('f-meeting').value    = ev.meeting_point || '';
  document.getElementById('f-cost').value       = ev.cost_per_person ?? '';
  document.getElementById('f-currency').value   = ev.currency || 'EUR';
  document.getElementById('f-notes').value      = ev.notes || '';
  document.getElementById('f-status').value     = ev.status;
}

function closeFormModal() {
  document.getElementById('overlay-form').classList.remove('visible');
  editEventId = null;
}

function closeFormIfBackdrop(e) {
  if (e.target === e.currentTarget) closeFormModal();
}

async function saveForm() {
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-date-start').value;
  if (!name) { document.getElementById('f-name').focus(); return; }
  if (!date) { document.getElementById('f-date-start').focus(); return; }

  const body = {
    peak_name:      name,
    activity_type:  document.getElementById('f-activity').value,
    planned_date:   date,
    end_date:       document.getElementById('f-date-end').value || null,
    difficulty:     document.getElementById('f-difficulty').value || null,
    duration_hours: parseFloat(document.getElementById('f-duration').value) || null,
    max_participants: parseInt(document.getElementById('f-max-p').value) || null,
    meeting_point:  document.getElementById('f-meeting').value.trim() || null,
    cost_per_person: parseFloat(document.getElementById('f-cost').value) || null,
    currency:       document.getElementById('f-currency').value,
    notes:          document.getElementById('f-notes').value.trim() || null,
  };

  const btn = document.getElementById('btn-form-save');
  btn.disabled = true;
  btn.textContent = editEventId ? t('form_btn_saving') : t('form_btn_creating');

  try {
    let r;
    if (editEventId) {
      r = await fetch(`/api/calendar/${editEventId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      // Also update status if changed
      const newStatus = document.getElementById('f-status').value;
      const ev = events.find(e => e.id === editEventId);
      if (ev && ev.status !== newStatus) {
        await fetch(`/api/calendar/${editEventId}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus }),
        });
      }
    } else {
      r = await fetch('/api/calendar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    }

    if (r.status === 401 || r.status === 403) { window.location.href = '/login.html'; return; }
    if (!r.ok) throw new Error();
    const saved = await r.json();

    if (editEventId) {
      events = events.map(e => e.id === editEventId ? saved : e);
    } else {
      events.push(saved);
    }

    closeFormModal();
    renderGrid();
    showToast(editEventId ? t('toast_event_updated') : t('toast_event_created'));
  } catch {
    showToast(t('err_save_event'), true);
  } finally {
    btn.disabled = false;
    btn.textContent = editEventId ? t('form_btn_save') : t('form_btn_create');
  }
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(d)} ${months[parseInt(m,10)-1]} ${y}`;
}

function ucFirst(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = error ? '#c0392b' : '#7ec87e';
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 3200);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetailModal(); closeFormModal(); }
});

// ── Profile modal ─────────────────────────────────────────────────────────────
async function openProfileModal() {
  const r = await fetch('/api/me').catch(() => null);
  if (!r || !r.ok) return;
  const me = await r.json();
  document.getElementById('profile-username').textContent = '@' + me.username;
  document.getElementById('profile-display-name').value = me.display_name || me.username;
  document.getElementById('overlay-profile').classList.add('visible');
  setTimeout(() => document.getElementById('profile-display-name').focus(), 80);
}
function closeProfileModal() {
  document.getElementById('overlay-profile').classList.remove('visible');
}
async function saveProfile() {
  const name = document.getElementById('profile-display-name').value.trim();
  if (!name) return;
  const btn = document.getElementById('btn-profile-save');
  btn.disabled = true;
  try {
    const r = await fetch('/api/me/profile', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ display_name: name }),
    });
    if (!r.ok) throw new Error();
    closeProfileModal();
    document.getElementById('user-badge').textContent = name;
    showToast(t('profile_saved'));
  } catch {
    showToast(t('profile_err'), true);
  } finally { btn.disabled = false; }
}

// ── Init ──────────────────────────────────────────────────────────────────────
fetch('/api/me').then(r => r.ok ? r.json() : null).then(me => {
  if (me) document.getElementById('user-badge').textContent = me.display_name || me.username;
}).catch(() => {});
loadEvents();
</script>
