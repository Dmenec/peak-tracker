app            = "peak-tracker"
primary_region = "mad"

[build]

[mounts]
  source      = "peak_tracker_data"
  destination = "/data"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
